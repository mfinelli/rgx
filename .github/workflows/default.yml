---
name: CI
on:
  push:
    branches: [master]
    tags: [v*]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  main:
    runs-on: ${{ matrix.os }}-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, macos, windows]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: cargo-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}
      - run: |
          rustc --version
          cargo --version
          cargo fmt --version
          cargo clippy --version
      - run: cargo fmt -- --check
      - run: cargo check --locked
      - run: cargo clippy --locked
      - run: cargo test --locked
      - run: cargo build --locked --release --verbose

  release:
    runs-on: ${{ matrix.os }}-latest
    timeout-minutes: 15
    needs: [main]
    permissions:
      contents: write
    strategy:
      matrix:
        os: [macos, ubuntu]
    steps:
      - name: Set OS name
        id: os
        run: >-
          echo "name=$(echo $RUNNER_OS | tr '[:upper:]' '[:lower:]')" >>
          $GITHUB_OUTPUT
      - name: Set arch
        id: arch
        run: |
          ARCH=$(uname -m)
          case $ARCH in
            x86_64)  echo "name=amd64" >> $GITHUB_OUTPUT ;;
            aarch64) echo "name=arm64" >> $GITHUB_OUTPUT ;;
            arm64)   echo "name=arm64" >> $GITHUB_OUTPUT ;;
            *)       echo "name=$ARCH" >> $GITHUB_OUTPUT ;;
          esac
      - name: Set ref name
        id: ref
        run: echo "name=${GITHUB_REF_NAME%%/*}" >> $GITHUB_OUTPUT
      - name: Set archive name
        id: archive
        run: |
          NAME="rgx"
          NAME="${NAME}_${{ steps.ref.outputs.name }}"
          NAME="${NAME}_${{ steps.os.outputs.name }}"
          NAME="${NAME}_${{ steps.arch.outputs.name }}"
          NAME="${NAME}.tar.zst"
          echo "name=${NAME}" >> $GITHUB_OUTPUT
      - uses: actions/checkout@v6
      - name: Set tar
        id: tar
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            brew install grep
            echo "cmd=gtar" >> $GITHUB_OUTPUT
          else
            echo "cmd=tar" >> $GITHUB_OUTPUT
          fi
      - uses: crazy-max/ghaction-import-gpg@v7
        if: startsWith(github.ref, 'refs/tags/')
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - run: cargo vendor --locked
      - run: cargo doc --frozen --no-deps --release
      - run: make
      - run: |
          mkdir dist
          cp target/release/rgx{.bash,.fish,.zsh} dist
          cp Cargo.{lock,toml} README.md CHANGELOG.md LICENSE dist
          rm -f target/doc/.lock
          cp -r target/doc dist/
          cp -r src dist/
          cp -r vendor dist/
      - run: |
          cd dist
          ${{ steps.tar.outputs.cmd }} --owner=0 --group=0 --sort=name -acvf \
            ../${{ steps.archive.outputs.name }} *
      - run: gpg -ba ${{ steps.archive.outputs.name }}
        if: startsWith(github.ref, 'refs/tags/')
      - uses: actions/upload-artifact@v7
        with:
          name: release_${{ matrix.os }}
          path: "*.tar.zst"
          retention-days: 1
      - uses: ncipollo/release-action@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          allowUpdates: true
          artifacts: rgx_*.tar.*
          token: ${{ secrets.GITHUB_TOKEN }}
